name: Daily Secret Report Scan

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      scan_count:
        description: 'Number of repositories to scan'
        required: false
        default: '3'

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Cython<3.0"
          pip install -r requirements.txt

      - name: Run daily scan
        env:
          SCAN_COUNT: ${{ github.event.inputs.scan_count || '3' }}
        run: |
          python tools/run_daily_scan.py --count $SCAN_COUNT

      - name: Commit and push report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scan_state.json reports/
          git commit -m "chore: Update daily secret scan report [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
